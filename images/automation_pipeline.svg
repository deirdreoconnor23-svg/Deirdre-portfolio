  <text x="790" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#C8860A" letter-spacing="2">06</text>

  <!-- 1. Data Ingestion -->
  <rect x="10" y="60" width="120" height="80" stroke="#E2DED8" stroke-width="1" fill="#F8F5F0"/>
